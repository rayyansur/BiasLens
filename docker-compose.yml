version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: biaslens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/biaslens
      ML_SERVICE_URL: http://ml:8001
    ports:
      - "8000:8000"
    depends_on:
      - db
      - ml
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./ml/checkpoints:/app/checkpoints

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pg_data:
